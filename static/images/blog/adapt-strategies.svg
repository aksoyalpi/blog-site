<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .card { fill: #f5f5f5; stroke: #ddd; stroke-width: 2; }
      .number { fill: #0066cc; font-size: 24px; font-weight: bold; }
      .title { fill: #333; font-size: 16px; font-weight: bold; }
      .subtitle { fill: #666; font-size: 13px; }
      .icon { font-size: 32px; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#fafafa"/>
  
  <!-- Card 1 -->
  <rect x="20" y="20" width="150" height="200" rx="8" class="card"/>
  <text x="50" y="50" class="number">1</text>
  <text x="35" y="85" class="title">Problem</text>
  <text x="35" y="105" class="title">Understanding</text>
  <text x="30" y="140" class="subtitle">Spend time</text>
  <text x="30" y="160" class="subtitle">understanding</text>
  <text x="30" y="180" class="subtitle">the problem</text>
  <text x="65" y="210" class="icon">🎯</text>
  
  <!-- Card 2 -->
  <rect x="190" y="20" width="150" height="200" rx="8" class="card"/>
  <text x="220" y="50" class="number">2</text>
  <text x="205" y="85" class="title">Use AI as</text>
  <text x="205" y="105" class="title">Thinking Tool</text>
  <text x="200" y="140" class="subtitle">Explore ideas</text>
  <text x="200" y="160" class="subtitle">quickly, then</text>
  <text x="200" y="180" class="subtitle">refine them</text>
  <text x="235" y="210" class="icon">🧠</text>
  
  <!-- Card 3 -->
  <rect x="360" y="20" width="150" height="200" rx="8" class="card"/>
  <text x="390" y="50" class="number">3</text>
  <text x="375" y="85" class="title">Go Deeper</text>
  <text x="375" y="105" class="title">on Hard</text>
  <text x="375" y="125" class="title">Problems</text>
  <text x="370" y="160" class="subtitle">System design,</text>
  <text x="370" y="180" class="subtitle">security, perf</text>
  <text x="405" y="210" class="icon">🔍</text>
  
  <!-- Card 4 -->
  <rect x="530" y="20" width="150" height="200" rx="8" class="card"/>
  <text x="560" y="50" class="number">4</text>
  <text x="545" y="85" class="title">Master</text>
  <text x="545" y="105" class="title">Communication</text>
  <text x="540" y="140" class="subtitle">Explain complex</text>
  <text x="540" y="160" class="subtitle">systems clearly</text>
  <text x="540" y="180" class="subtitle">to others</text>
  <text x="575" y="210" class="icon">💬</text>
  
  <!-- Card 5 -->
  <rect x="700" y="20" width="80" height="200" rx="8" class="card"/>
  <text x="720" y="50" class="number">5</text>
  <text x="705" y="85" class="title">Stay</text>
  <text x="705" y="105" class="title">Curious</text>
  <text x="700" y="150" class="subtitle">Keep</text>
  <text x="700" y="170" class="subtitle">learning</text>
  <text x="720" y="210" class="icon">📚</text>
  
  <!-- Bottom message -->
  <rect x="40" y="290" width="720" height="180" rx="8" fill="#e8f4ff" stroke="#0066cc" stroke-width="2"/>
  <text x="60" y="330" class="title" style="fill: #0066cc; font-size: 18px;">The Key Shift</text>
  <text x="60" y="360" style="fill: #333; font-size: 15px;">Engineers who thrive aren't those who fight AI or ignore it.</text>
  <text x="60" y="385" style="fill: #333; font-size: 15px;">They're the ones who see it as a tool that amplifies what</text>
  <text x="60" y="410" style="fill: #333; font-size: 15px;">makes them valuable: solving hard problems, making good</text>
  <text x="60" y="435" style="fill: #333; font-size: 15px;">decisions, and building reliable systems.</text>
</svg>
